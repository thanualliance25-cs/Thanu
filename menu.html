<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Menu</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#e8f5e9,#f1f8e9);
}

/* Topbar */
.topbar{
    background:#2e7d32;
    color:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* Sidebar */
.sidebar{
    width:220px;
    height:100vh;
    background:#1b5e20;
    position:fixed;
    padding-top:20px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#2e7d32;
}

/* Main */
.main{
    margin-left:220px;
    padding:20px;
}

/* GRID */
.menu-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* GLASS CARD */
.menu-card{
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius:15px;
    padding:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    border:1px solid rgba(255,255,255,0.3);
}

.menu-card h3{
    margin-top:0;
    color:#1b5e20;
}

/* Items */
pre{
    font-family:Arial;
    font-size:15px;
    white-space:pre-wrap;
    line-height:1.6;
}

/* Price */
.price{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
    color:#d32f2f;
}

/* Mobile */
@media (max-width:768px){
    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main{
        margin-left:0;
    }
}

</style>
</head>

<body>

<div class="topbar">
🍽 Daily Menu
</div>

<div class="sidebar">
<a href="home.html">🏠 Home</a>
<a href="canteen.html">🍛 Canteen Info</a>
<a href="menu.html">🍽 Daily Menu</a>
<a href="updates.html">📢 Quick Updates</a>
<a href="feedback.html">📝 Feedback</a>
<a href="admin.html">🛠 Admin Panel</a>
</div>

<div class="main">

<div class="menu-grid">

<div class="menu-card">
<h3>Breakfast</h3>
<pre id="breakfastItems"></pre>
<p class="price" id="breakfastPrice"></p>
</div>

<div class="menu-card">
<h3>Lunch</h3>
<pre id="lunchItems"></pre>
<p class="price" id="lunchPrice"></p>
</div>

<div class="menu-card">
<h3>Snacks</h3>
<pre id="snacksItems"></pre>
<p class="price" id="snacksPrice"></p>
</div>

<div class="menu-card">
<h3>Dinner</h3>
<pre id="dinnerItems"></pre>
<p class="price" id="dinnerPrice"></p>
</div>

</div>

</div>

<script>

/* LOAD DATA */

document.getElementById("breakfastItems").innerText =
    localStorage.getItem("breakfastItems") || "Not updated";

document.getElementById("breakfastPrice").innerText =
    "Price: ₹" + (localStorage.getItem("breakfastPrice") || "--");


document.getElementById("lunchItems").innerText =
    localStorage.getItem("lunchItems") || "Not updated";

document.getElementById("lunchPrice").innerText =
    "Price: ₹" + (localStorage.getItem("lunchPrice") || "--");


document.getElementById("snacksItems").innerText =
    localStorage.getItem("snacksItems") || "Not updated";

document.getElementById("snacksPrice").innerText =
    "Price: ₹" + (localStorage.getItem("snacksPrice") || "--");


document.getElementById("dinnerItems").innerText =
    localStorage.getItem("dinnerItems") || "Not updated";

document.getElementById("dinnerPrice").innerText =
    "Price: ₹" + (localStorage.getItem("dinnerPrice") || "--");

</script>

</body>
</html>
