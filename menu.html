<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Menu</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#c8e6c9,#e8f5e9);
}

/* Topbar */
.topbar{
    background:#2e7d32;
    color:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* Sidebar */
.sidebar{
    width:220px;
    height:100vh;
    background:#1b5e20;
    position:fixed;
    top:60px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#2e7d32;
}

/* Main */
.main{
    margin-left:220px;
    padding:20px;
    margin-top:60px;
}

/* Banner */
.banner{
    background: linear-gradient(135deg,#2e7d32,#66bb6a);
    color:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
}

/* Grid */
.menu-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* Card */
.menu-card{
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    border-left:5px solid #2e7d32;
    transition:0.3s;
}

.menu-card:hover{
    transform:scale(1.03);
}

.menu-card h3{
    margin-top:0;
    color:#1b5e20;
}

/* Items */
pre{
    white-space:pre-wrap;
    font-size:15px;
}

/* Price */
.price{
    color:#d32f2f;
    font-weight:bold;
    margin-top:10px;
    font-size:16px;
}

/* Mobile */
@media (max-width:768px){
    .sidebar{
        width:100%;
        height:auto;
        position:relative;
        top:0;
    }

    .main{
        margin-left:0;
        margin-top:0;
    }
}

</style>
</head>

<body>

<div class="topbar">🍽 Daily Menu</div>

<div class="sidebar">
<a href="home.html">🏠 Home</a>
<a href="canteen.html">🍛 Canteen Info</a>
<a href="menu.html">🍽 Daily Menu</a>
<a href="updates.html">📢 Quick Updates</a>
<a href="admin.html">🛠 Admin Panel</a>
</div>

<div class="main">

<div class="banner">
🍽 Today’s Delicious Menu
</div>

<div class="menu-grid">

<div class="menu-card">
<h3>Breakfast</h3>
<pre id="bItems"></pre>
<p class="price" id="bPrice"></p>
</div>

<div class="menu-card">
<h3>Lunch</h3>
<pre id="lItems"></pre>
<p class="price" id="lPrice"></p>
</div>

<div class="menu-card">
<h3>Snacks</h3>
<pre id="sItems"></pre>
<p class="price" id="sPrice"></p>
</div>

<div class="menu-card">
<h3>🍽 Dinner</h3>
<pre id="dItems"></pre>
<p class="price" id="dPrice"></p>
</div>

</div>

</div>

<script>

/* LOAD MENU DATA */

bItems.innerText = localStorage.getItem("breakfastItems") || "Not updated";
bPrice.innerText = "Price: ₹" + (localStorage.getItem("breakfastPrice") || "--");

lItems.innerText = localStorage.getItem("lunchItems") || "Not updated";
lPrice.innerText = "Price: ₹" + (localStorage.getItem("lunchPrice") || "--");

sItems.innerText = localStorage.getItem("snacksItems") || "Not updated";
sPrice.innerText = "Price: ₹" + (localStorage.getItem("snacksPrice") || "--");

dItems.innerText = localStorage.getItem("dinnerItems") || "Not updated";
dPrice.innerText = "Price: ₹" + (localStorage.getItem("dinnerPrice") || "--");

/* ADD DATE TO BANNER */
document.querySelector(".banner").innerText += " - " + new Date().toDateString();

</script>

</body>
</html>
