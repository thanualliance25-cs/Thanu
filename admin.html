<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
background:url('campus-banner.jpg') no-repeat center center;
background-size:cover;
}

/* LOGIN BOX LEFT */
.login-box{
width:350px;
padding:40px;
position:absolute;
top:50%;
left:8%;
transform:translateY(-50%);
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
text-align:center;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#2e7d32;
color:white;
padding:10px;
border:none;
cursor:pointer;
border-radius:5px;
}

#adminPanel{
display:none;
padding:20px;
background:linear-gradient(135deg,#c8e6c9,#e8f5e9);
min-height:100vh;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

textarea,input{
width:100%;
padding:8px;
margin:5px 0;
}

.feedback-box{
background:#fff;
padding:15px;
border-radius:10px;
max-height:200px;
overflow:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
<h2>Admin Login</h2>

<input type="email" id="adminEmail" placeholder="Admin Email">
<input type="password" id="adminPassword" placeholder="Password">

<button onclick="login()">Login</button>
<br><br>
<a href="#" onclick="forgotPassword()">Forgot Password?</a>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

<h2>🛠 Admin Control Panel</h2>

<div class="card">
<h3>🍳 Breakfast</h3>
<textarea id="bItems"></textarea>
<input id="bPrice" placeholder="Price">
</div>

<div class="card">
<h3>🍛 Lunch</h3>
<textarea id="lItems"></textarea>
<input id="lPrice" placeholder="Price">
</div>

<div class="card">
<h3>☕ Snacks</h3>
<textarea id="sItems"></textarea>
<input id="sPrice" placeholder="Price">
</div>

<div class="card">
<h3>🍽 Dinner</h3>
<textarea id="dItems"></textarea>
<input id="dPrice" placeholder="Price">
</div>

<button onclick="saveMenu()">Save Menu</button>

<hr>

<div class="card">
<h3>📢 Add Quick Update</h3>
<textarea id="updateText"></textarea>
<input id="updatePrice" placeholder="Price optional">
<button onclick="addUpdate()">Add Update</button>
</div>

<div class="card">
<h3>💬 View Feedback</h3>
<button onclick="loadFeedback()">Load Feedback</button>
<div class="feedback-box" id="feedbackBox"></div>
</div>

</div>

<script>
function login(){
let email=adminEmail.value.trim();
let pass=adminPassword.value;

if(!email.endsWith("@alliance.edu.in")){
alert("Use admin email");
return;
}

let saved=localStorage.getItem(email);

if(saved==null){
localStorage.setItem(email,pass);
}

if(localStorage.getItem(email)==pass){
loginBox.style.display="none";
adminPanel.style.display="block";
}else{
alert("Wrong password");
}
}

function forgotPassword(){
let email=prompt("Enter admin email");
if(!email) return;

let newPass=prompt("Enter new password");
if(newPass){
localStorage.setItem(email,newPass);
alert("Password updated");
}
}

function saveMenu(){
localStorage.setItem("breakfastItems", bItems.value);
localStorage.setItem("breakfastPrice", bPrice.value);

localStorage.setItem("lunchItems", lItems.value);
localStorage.setItem("lunchPrice", lPrice.value);

localStorage.setItem("snacksItems", sItems.value);
localStorage.setItem("snacksPrice", sPrice.value);

localStorage.setItem("dinnerItems", dItems.value);
localStorage.setItem("dinnerPrice", dPrice.value);

alert("Menu updated successfully");
}

function addUpdate(){
let updates=JSON.parse(localStorage.getItem("updatesList")) || [];

updates.push({
text:updateText.value,
price:updatePrice.value,
time:new Date().toLocaleString()
});

localStorage.setItem("updatesList",JSON.stringify(updates));

alert("Update added successfully");
}

function loadFeedback(){
let feedback=JSON.parse(localStorage.getItem("feedbackList")) || [];

if(feedback.length===0){
feedbackBox.innerHTML="No feedback yet";
return;
}

feedbackBox.innerHTML="";
feedback.forEach(f=>{
feedbackBox.innerHTML += "<p>• "+f+"</p>";
});
}
</script>

</body>
</html>
