<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>

/* BODY WITH BACKGROUND */
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                url('campus-banner.jpg') no-repeat center center;
    background-size: cover;
}

/* 🔐 LOGIN BOX (GLASS EFFECT) */
.login-box{
    width:350px;
    padding:30px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    border-radius:15px;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
    color:white;
}

.login-box h2{
    text-align:center;
}

.login-box input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:none;
}

.login-box button{
    width:100%;
    margin-top:10px;
}

/* 🛠 ADMIN PANEL (hidden initially) */
#adminContent{
    display:none;
    background:#f4f6f9;
    min-height:100vh;
}

/* TOPBAR */
.topbar{
    background:#2e7d32;
    color:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    height:100vh;
    background:#1b5e20;
    position:fixed;
    top:60px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#2e7d32;
}

/* MAIN */
.main{
    margin-left:220px;
    padding:20px;
    margin-top:60px;
}

/* CARD */
.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* INPUTS */
textarea, input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

/* BUTTON */
button{
    padding:10px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1b5e20;
}

/* FEEDBACK BOX */
.feedback-box{
    background:#f1f1f1;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
}

</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div class="login-box" id="loginBox">
<h2>Admin Login</h2>

<input type="email" id="adminEmail" placeholder="Staff Email">
<input type="password" id="adminPass" placeholder="Password">

<button onclick="adminLogin()">Login</button>
<button onclick="resetPassword()">Forgot Password?</button>

<p style="font-size:12px; color:#eee; text-align:center;">
Demo system (no real email verification)
</p>
</div>

<!-- 🛠 ADMIN PANEL -->
<div id="adminContent">

<div class="topbar">Admin Panel</div>

<div class="sidebar">
<a href="#">📊 Dashboard</a>
<a href="#menu">🍽 Menu</a>
<a href="#updates">📢 Updates</a>
<a href="#feedback">📝 Feedback</a>
</div>

<div class="main">

<!-- MENU -->
<div class="card" id="menu">
<h2>Update Menu</h2>

<textarea id="breakfastItems" placeholder="Breakfast Items"></textarea>
<input id="breakfastPrice" placeholder="Total Price">

<button onclick="saveMenu()">Save Menu</button>
</div>

<!-- UPDATES -->
<div class="card" id="updates">
<h2>Quick Update</h2>

<textarea id="updateText" placeholder="Enter update"></textarea>
<input id="updatePrice" placeholder="Optional Price">

<button onclick="saveUpdate()">Post Update</button>
</div>

<!-- FEEDBACK -->
<div class="card" id="feedback">
<h2>Student Feedback</h2>
<div id="feedbackList"></div>
</div>

</div>

</div>

<script>

/* 🔐 LOGIN */
function adminLogin(){

    let email = adminEmail.value;
    let pass = adminPass.value;

    if(!email.endsWith("@staff.alliance.edu.in")){
        alert("❌ Use staff email only!");
        return;
    }

    let savedPass = localStorage.getItem(email);

    if(savedPass === null){
        localStorage.setItem(email, pass);
        alert("✅ Password set successfully!");
        showAdmin();
    }
    else if(savedPass === pass){
        showAdmin();
    }
    else{
        alert("❌ Wrong password!");
    }
}

/* SHOW ADMIN PANEL */
function showAdmin(){
    loginBox.style.display="none";
    adminContent.style.display="block";
}

/* 🔁 RESET PASSWORD */
function resetPassword(){

    let email = prompt("Enter your admin email");

    if(!email || !email.endsWith("@staff.alliance.edu.in")){
        alert("❌ Invalid staff email!");
        return;
    }

    let exists = localStorage.getItem(email);

    if(exists === null){
        alert("❌ No account found!");
        return;
    }

    let newPass = prompt("Enter new password");

    if(!newPass){
        alert("❌ Password cannot be empty!");
        return;
    }

    localStorage.setItem(email, newPass);

    alert("✅ Password reset successful!");
}

/* 🍽 SAVE MENU */
function saveMenu(){
    localStorage.setItem("breakfastItems", breakfastItems.value);
    localStorage.setItem("breakfastPrice", breakfastPrice.value);
    alert("✅ Menu saved!");
}

/* 📢 SAVE UPDATE (MULTIPLE UPDATES) */
function saveUpdate(){

    let text = updateText.value;
    let price = updatePrice.value;

    if(text.trim() === ""){
        alert("Enter update!");
        return;
    }

    let updates = JSON.parse(localStorage.getItem("updatesList")) || [];

    updates.push({
        text: text,
        price: price,
        time: new Date().toLocaleString()
    });

    localStorage.setItem("updatesList", JSON.stringify(updates));

    alert("📢 Update posted!");

    updateText.value = "";
    updatePrice.value = "";
}

/* 📝 LOAD FEEDBACK */
function loadFeedback(){
    let fb = JSON.parse(localStorage.getItem("feedbacks")) || [];
    let out = "";

    fb.forEach(f=>{
        out += `
        <div class="feedback-box">
            <b>${f.name}</b><br>
            ${f.message}<br>
            <small>${f.time}</small>
        </div>`;
    });

    feedbackList.innerHTML = out || "No feedback yet";
}

loadFeedback();

</script>

</body>
</html>
