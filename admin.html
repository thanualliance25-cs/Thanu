<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}

/* Topbar */
.topbar{
    background:#2e7d32;
    color:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* Sidebar */
.sidebar{
    width:220px;
    height:100vh;
    background:#1b5e20;
    position:fixed;
    padding-top:20px;
    top:60px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover,
.sidebar a.active{
    background:#2e7d32;
}

/* Main */
.main{
    margin-left:220px;
    padding:20px;
    margin-top:60px;
}

/* Card */
.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* Inputs */
input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

/* Button */
button{
    padding:10px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1b5e20;
}

/* Feedback Box */
.feedback-box{
    background:#f1f1f1;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
}

/* Mobile */
@media (max-width:768px){
    .sidebar{
        width:100%;
        height:auto;
        position:relative;
        top:0;
    }

    .main{
        margin-left:0;
        margin-top:0;
    }
}

</style>
</head>

<body>

<div class="topbar">
Admin Panel - Staff Interface
</div>

<div class="sidebar">
<a href="#" class="active">📊 Dashboard</a>
<a href="#menu">🍽 Update Menu</a>
<a href="#updates">📢 Quick Updates</a>
<a href="#feedback">📝 View Feedback</a>
</div>

<div class="main">

<!-- 🍽 MENU -->
<div class="card" id="menu">
<h2>Update Daily Menu (Buffet System)</h2>

<label>Breakfast Items</label>
<textarea id="breakfastItems"></textarea>
<input type="text" id="breakfastPrice" placeholder="Total Price (₹)">

<label>Lunch Items</label>
<textarea id="lunchItems"></textarea>
<input type="text" id="lunchPrice" placeholder="Total Price (₹)">

<label>Snacks Items</label>
<textarea id="snacksItems"></textarea>
<input type="text" id="snacksPrice" placeholder="Total Price (₹)">

<label>Dinner Items</label>
<textarea id="dinnerItems"></textarea>
<input type="text" id="dinnerPrice" placeholder="Total Price (₹)">

<button onclick="saveMenu()">Save Menu</button>
</div>

<!-- 📢 QUICK UPDATES -->
<div class="card" id="updates">
<h2>Post Quick Update</h2>

<textarea id="updateText" placeholder="Enter update..."></textarea>
<input type="text" id="updatePrice" placeholder="Optional Price (₹)">

<button onclick="saveUpdate()">Post Update</button>
</div>

<!-- 📝 FEEDBACK -->
<div class="card" id="feedback">
<h2>Student Feedback</h2>
<div id="feedbackList"></div>
</div>

</div>

<script>

/* 🍽 SAVE MENU */
function saveMenu(){

    localStorage.setItem("breakfastItems", breakfastItems.value);
    localStorage.setItem("breakfastPrice", breakfastPrice.value);

    localStorage.setItem("lunchItems", lunchItems.value);
    localStorage.setItem("lunchPrice", lunchPrice.value);

    localStorage.setItem("snacksItems", snacksItems.value);
    localStorage.setItem("snacksPrice", snacksPrice.value);

    localStorage.setItem("dinnerItems", dinnerItems.value);
    localStorage.setItem("dinnerPrice", dinnerPrice.value);

    alert("✅ Menu Updated Successfully!");
}

/* 📢 SAVE UPDATE */
function saveUpdate(){
    let update = updateText.value;
    let price = updatePrice.value;

    if(update.trim() === ""){
        alert("⚠️ Enter something!");
        return;
    }

    localStorage.setItem("update", update);
    localStorage.setItem("updatePrice", price);
    localStorage.setItem("updateTime", new Date().toLocaleString());

    alert("📢 Update Posted Successfully!");

    updateText.value = "";
    updatePrice.value = "";
}

/* 📝 LOAD FEEDBACK */
function loadFeedback(){

    let feedbacks = JSON.parse(localStorage.getItem("feedbacks")) || [];

    let output = "";

    feedbacks.forEach(f => {
        output += `
        <div class="feedback-box">
            <strong>${f.name}</strong><br>
            ${f.message}<br>
            <small>${f.time}</small>
        </div>
        `;
    });

    document.getElementById("feedbackList").innerHTML =
        output || "No feedback yet";
}

loadFeedback();

</script>

</body>
</html>
