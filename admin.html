<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            height: 100vh;
            background: url('campus-banner.jpg') no-repeat center center;
            background-size: cover;
        }

        .login-box {
            width: 350px;
            padding: 40px;
            position: absolute;
            top: 50%;
            left: 10%; /* left-aligned */
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            color: black;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #c82333;
        }

        .login-box a {
            color: #007bff;
            text-decoration: none;
        }

        .login-box a:hover {
            text-decoration: underline;
        }

        .forgot-password {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Admin Login</h2>
    <input type="email" placeholder="Admin Email ID" id="adminEmail">
    <input type="password" placeholder="Password" id="adminPassword">
    <button onclick="adminLogin()">Login</button>
    
    <div class="forgot-password">
        <a href="#" onclick="forgotPassword()">Forgot Password?</a>
    </div>
</div>

<script>
function adminLogin() {
    var email = document.getElementById('adminEmail').value.trim();
    var password = document.getElementById('adminPassword').value;

    if(!email.endsWith("@alliance.edu.in")){
        alert("Enter valid Admin email");
        return;
    }

    var savedPassword = localStorage.getItem(email);

    if(savedPassword === null){
        localStorage.setItem(email, password);
        alert("Password set successfully. Use same password next time.");
        window.location.href = "admin-home.html";
    }
    else if(savedPassword === password){
        window.location.href = "admin-home.html";
    }
    else{
        alert("Wrong password for this admin");
    }
}

// Forgot password function for admin
function forgotPassword() {
    var email = prompt("Enter your admin email to reset password:");

    if(!email || !email.endsWith("@alliance.edu.in")) {
        alert("Enter a valid Admin email");
        return;
    }

    var savedPassword = localStorage.getItem(email);

    if(savedPassword === null){
        alert("No account found with this email.");
    } else {
        var newPassword = prompt("Enter your new password:");
        if(newPassword){
            localStorage.setItem(email, newPassword);
            alert("Password reset successfully. Use new password to login.");
        }
    }
}
</script>

</body>
</html>
