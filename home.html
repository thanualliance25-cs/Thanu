<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background: url('banner1.jpg') no-repeat center center;
    background-size: cover;
}

/* Topbar */
.topbar{
    background:#2e7d32;
    color:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* Sidebar */
.sidebar{
    width:220px;
    height:100vh;
    background:#1b5e20;
    position:fixed;
    top:60px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#2e7d32;
}

/* Main */
.main{
    margin-left:220px;
    margin-top:60px;
    height:calc(100vh - 60px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

/* Welcome Text */
.hero{
    font-size:40px;
    font-weight:bold;
    text-shadow:2px 2px 5px rgba(0,0,0,0.7);
}

/* Footer */
.footer{
    position:absolute;
    bottom:10px;
    text-align:center;
    width:100%;
    color:white;
    text-shadow:1px 1px 5px rgba(0,0,0,0.7);
    font-size:14px;
}

/* Mobile */
@media (max-width:768px){

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
        top:0;
    }

    .main{
        margin-left:0;
        margin-top:0;
    }
}

</style>
</head>

<body>

<div class="topbar">
Student Dashboard
</div>

<div class="sidebar">

<a href="feedback.html">📝 Feedback</a>
<a href="faq.html">❓ FAQ</a>
<a href="admin.html">🛠 Admin Panel</a>
</div>

<div class="main">

<div class="hero">

</div>

<div class="footer">
<strong>Alliance University</strong><br>

</div>

</div>

</body>
</html>
