<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}

/* Topbar */
.topbar{
    background:#2e7d32;
    color:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* Sidebar */
.sidebar{
    width:220px;
    height:calc(100vh - 60px);
    background:#1b5e20;
    position:fixed;
    top:60px;
    left:0;
    overflow-y:auto;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#2e7d32;
}

/* Main */
.main{
    margin-left:220px;
    margin-top:60px;
    padding:20px;
}

/* Glass Banner */
.glass-box{
    width:100%;
    height:320px;
    border-radius:10px;

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;
    font-size:40px;
    font-weight:bold;
    text-align:center;

    /* Image inside box */
    background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url('banner1.jpg') no-repeat center center;

    background-size:cover;

    /* Glass effect */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    box-shadow:0 8px 25px rgba(0,0,0,0.3);
    text-shadow:2px 2px 10px rgba(0,0,0,0.8);
}

/* Footer */
.footer{
    margin-top:20px;
    padding:15px;
    background:white;
    border-radius:8px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    font-size:14px;
}

/* Mobile */
@media (max-width:768px){

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
        top:0;
    }

    .main{
        margin-left:0;
        margin-top:0;
    }
}

</style>
</head>

<body>

<div class="topbar">
Student Dashboard
</div>

<div class="sidebar">
<a href="home.html">🏠 Home</a>
<a href="canteen.html">🍛 Canteen Info</a>
<a href="menu.html">🍽 Daily Menu</a>
<a href="updates.html">📢 Quick Updates</a>
<a href="feedback.html">📝 Feedback</a>
<a href="faq.html">❓ FAQ</a>
<a href="admin.html">🛠 Admin Panel</a>
</div>

<div class="main">

<div class="glass-box">
WELCOME, STUDENT!
</div>

<div class="footer">
<strong>Alliance University</strong><br>
Chikkahagade Cross, Chandapura-Anekal Main Road,<br>
Anekal, Bengaluru - 562106
</div>

</div>

</body>
</html>
