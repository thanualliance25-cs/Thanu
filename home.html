<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}

/* Top bar */
.topbar{
    background:#2e7d32;
    color:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* Sidebar */
.sidebar{
    width:220px;
    height:100vh;
    background:#1b5e20;
    position:fixed;
    padding-top:20px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
    font-size:16px;
}

.sidebar a:hover{
    background:#2e7d32;
}

/* Main content */
.main{
    margin-left:220px;
    padding:20px;
}

/* Hero banner */
.hero{
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                url('banner1.jpg') no-repeat center/cover;
    height:350px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:32px;
    font-weight:bold;
    text-shadow:2px 2px 5px rgba(0,0,0,0.8);
}

/* Footer */
.footer{
    margin-top:20px;
    padding:15px;
    background:white;
    border-radius:8px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    font-size:14px;
}

/* Mobile responsive */
@media (max-width:768px){

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main{
        margin-left:0;
    }

    .hero{
        height:200px;
        font-size:22px;
        padding:10px;
        text-align:center;
    }

    .topbar{
        text-align:center;
    }

}

</style>
</head>

<body>

<div class="topbar">
Student Dashboard
</div>

<div class="sidebar">
<a href="home.html">🏠 Home</a>
<a href="canteen.html">🍛 Canteen Info</a>
<a href="menu.html">🍽 Daily Menu</a>
<a href="updates.html">📢 Quick Updates</a>
<a href="feedback.html">📝 Feedback</a>
</div>

<div class="main">

<div class="hero">
WELCOME, STUDENT!
</div>

<div class="footer">
<strong>Alliance University</strong><br>
Chikkahagade Cross, Chandapura-Anekal Main Road,<br>
Anekal, Bengaluru - 562106, Karnataka, India
</div>

</div>

</body>
</html>
