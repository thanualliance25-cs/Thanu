<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background: url('banner1.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* Topbar */
.topbar{
    background:#2e7d32;
    color:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* Sidebar */
.sidebar{
    width:220px;
    height:calc(100vh - 60px);
    background:#1b5e20;
    position:fixed;
    top:60px;
    left:0;
    overflow-y:auto;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#2e7d32;
}

/* Main */
.main{
    margin-left:220px;
    margin-top:60px;
    height:calc(100vh - 60px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* Glass Box */
.glass-box{
    padding:40px 60px;
    border-radius:15px;

    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.3);

    color:white;
    font-size:36px;
    font-weight:bold;
    text-align:center;

    text-shadow:2px 2px 10px rgba(0,0,0,0.6);
}

/* Footer */
.footer{
    position:absolute;
    bottom:10px;
    text-align:center;
    width:100%;
    color:white;
    text-shadow:1px 1px 5px rgba(0,0,0,0.7);
    font-size:14px;
}

/* Mobile */
@media (max-width:768px){

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
        top:0;
    }

    .main{
        margin-left:0;
        margin-top:0;
        height:auto;
        padding:20px;
    }
}

</style>
</head>

<body>

<div class="topbar">
Student Dashboard
</div>

<div class="sidebar">
<a href="home.html">🏠 Home</a>
<a href="canteen.html">🍛 Canteen Info</a>
<a href="menu.html">🍽 Daily Menu</a>
<a href="updates.html">📢 Quick Updates</a>
<a href="feedback.html">📝 Feedback</a>
<a href="faq.html">❓ FAQ</a>
<a href="admin.html">🛠 Admin Panel</a>
</div>

<div class="main">

<div class="glass-box">
WELCOME, STUDENT!
</div>

<div class="footer">
<strong>Alliance University</strong><br>
Chikkahagade Cross, Chandapura-Anekal Main Road,<br>
Anekal, Bengaluru - 562106
</div>

</div>

</body>
</html>
