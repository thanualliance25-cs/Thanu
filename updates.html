<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Updates</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#c8e6c9,#e8f5e9);
}

/* Topbar */
.topbar{
    background:#2e7d32;
    color:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* Sidebar */
.sidebar{
    width:220px;
    height:100vh;
    background:#1b5e20;
    position:fixed;
    top:60px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#2e7d32;
}

/* Main */
.main{
    margin-left:220px;
    padding:20px;
    margin-top:60px;
}

/* Update Card */
.update-card{
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:0.3s;
}

.update-card:hover{
    transform:scale(1.02);
}

.price{
    color:#d32f2f;
    font-weight:bold;
    margin-top:10px;
}

.time{
    font-size:12px;
    color:gray;
    margin-top:5px;
}

@media (max-width:768px){
    .sidebar{
        width:100%;
        height:auto;
        position:relative;
        top:0;
    }

    .main{
        margin-left:0;
        margin-top:0;
    }
}

</style>
</head>

<body>

<div class="topbar">📢 Quick Updates</div>

<div class="sidebar">
<a href="home.html">🏠 Home</a>
<a href="canteen.html">🍛 Canteen Info</a>
<a href="menu.html">🍽 Daily Menu</a>
<a href="updates.html">📢 Quick Updates</a>
<a href="feedback.html">📝 Feedback</a>
<a href="faq.html">❓ FAQ</a>
<a href="admin.html">🛠 Admin Panel</a>
</div>

<div class="main" id="updatesContainer">

<!-- Updates will appear here -->

</div>

<script>

/* LOAD ALL UPDATES */
let updates = JSON.parse(localStorage.getItem("updatesList")) || [];

let container = document.getElementById("updatesContainer");

if(updates.length === 0){
    container.innerHTML = "<p>No updates available</p>";
}else{
    updates.reverse().forEach(u => {
        container.innerHTML += `
        <div class="update-card">
            <h3>${u.text}</h3>
            ${u.price ? `<p class="price">Price: ₹${u.price}</p>` : ""}
            <p class="time">${u.time}</p>
        </div>
        `;
    });
}

</script>

</body>
</html>
