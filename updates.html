<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Updates</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#c8e6c9,#e8f5e9);
}

/* Topbar */
.topbar{
    background:#2e7d32;
    color:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* Sidebar */
.sidebar{
    width:220px;
    height:100vh;
    background:#1b5e20;
    position:fixed;
    padding-top:20px;
    top:60px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#2e7d32;
}

/* Main */
.main{
    margin-left:220px;
    padding:20px;
    margin-top:60px;
}

/* Banner */
.banner{
    background: linear-gradient(135deg,#2e7d32,#66bb6a);
    color:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* Update Card */
.update-card{
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(15px);
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    border-left:6px solid #2e7d32;
    transition: transform 0.3s ease;
}

.update-card:hover{
    transform: scale(1.02);
}

/* Text */
.update-text{
    font-size:18px;
    line-height:1.7;
    color:#1b5e20;
}

/* Time */
.time{
    margin-top:15px;
    font-size:14px;
    color:#555;
}

/* Mobile */
@media (max-width:768px){
    .sidebar{
        width:100%;
        height:auto;
        position:relative;
        top:0;
    }

    .main{
        margin-left:0;
        margin-top:0;
    }
}

</style>
</head>

<body>

<div class="topbar">
📢 Quick Updates
</div>

<div class="sidebar">
<a href="home.html">🏠 Home</a>
<a href="canteen.html">🍛 Canteen Info</a>
<a href="menu.html">🍽 Daily Menu</a>
<a href="updates.html">📢 Quick Updates</a>
<a href="feedback.html">📝 Feedback</a>
<a href="admin.html">🛠 Admin Panel</a>
</div>

<div class="main">

<div class="banner">
🚨 Latest Announcements from Canteen
</div>

<div class="update-card">
<p class="update-text" id="updateTextDisplay"></p>
<p class="time" id="updateTime"></p>
</div>

</div>

<script>

/* LOAD UPDATE */

let update = localStorage.getItem("update");
let time = localStorage.getItem("updateTime");

/* Show update */
document.getElementById("updateTextDisplay").innerText =
    update || "No updates available today.";

/* Show time */
if(time){
    document.getElementById("updateTime").innerText = "Updated on: " + time;
}else{
    document.getElementById("updateTime").innerText = "";
}

</script>

</body>
</html>
