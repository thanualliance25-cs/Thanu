<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            height: 100vh;
            background: url('campus-banner.jpg') no-repeat center center;
            background-size: cover;
        }

        .login-box {
            width: 350px;
            padding: 40px;
            position: absolute;
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            color: black;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Student Login</h2>
    <input type="email" placeholder="College Email ID">
    <input type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<script>
function login() {

    var username = document.querySelector('input[type="email"]').value;
    var password = document.querySelector('input[type="password"]').value;

    // check valid college email
    if(!username.endsWith("@stu.alliance.edu.in")){
        alert("Enter valid Alliance college email");
        return;
    }

    // check if password already saved
    var savedPassword = localStorage.getItem(username);

    if(savedPassword === null){
        // first time login → save password
        localStorage.setItem(username, password);
        alert("Password set successfully. Use same password next time.");
        window.location.href = "home.html";
    }
    else if(savedPassword === password){
        // correct password
        window.location.href = "home.html";
    }
    else{
        alert("Wrong password for this student");
    }
}
</script>

</body>
</html>
