<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            height: 100vh;
            background: url('campus-banner.jpg') no-repeat center center;
            background-size: cover;
        }

        .login-box {
            width: 350px;
            padding: 40px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            color: black;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #218838;
        }

        .login-box a {
            color: #007bff;
            text-decoration: none;
        }

        .login-box a:hover {
            text-decoration: underline;
        }

        .forgot-password {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Student Login</h2>
    <input type="email" placeholder="College Email ID" id="email">
    <input type="password" placeholder="Password" id="password">
    <button onclick="login()">Login</button>
    
    <div class="forgot-password">
        <a href="#" onclick="forgotPassword()">Forgot Password?</a>
    </div>
</div>

<script>
function login() {
    var username = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;

    if(!username.endsWith("@stu.alliance.edu.in")){
        alert("Enter valid Alliance college email");
        return;
    }

    var savedPassword = localStorage.getItem(username);

    if(savedPassword === null){
        localStorage.setItem(username, password);
        alert("Password set successfully. Use same password next time.");
        window.location.href = "home.html";
    }
    else if(savedPassword === password){
        window.location.href = "home.html";
    }
    else{
        alert("Wrong password for this student");
    }
}

// Forgot password function
function forgotPassword() {
    var email = prompt("Enter your college email to reset password:");

    if(!email || !email.endsWith("@stu.alliance.edu.in")) {
        alert("Enter a valid Alliance college email");
        return;
    }

    var savedPassword = localStorage.getItem(email);

    if(savedPassword === null){
        alert("No account found with this email.");
    } else {
        var newPassword = prompt("Enter your new password:");
        if(newPassword){
            localStorage.setItem(email, newPassword);
            alert("Password reset successfully. Use new password to login.");
        }
    }
}
</script>

</body>
</html>
