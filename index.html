<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>

    <style>
        body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    height: 100vh;

    background: url('campus-banner.jpg') no-repeat center center;
    background-size: cover;
}

       .login-box {
    width: 350px;
    padding: 40px;

    /* Move to left */
    position: absolute;
    top: 50%;           /* vertical center */
    left: 10%;          /* adjust horizontal position, e.g., 10% from left */
    transform: translateY(-50%);  /* only vertical centering */

    /* Glass effect */
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    color: black;
    text-align: center;
}

        .login-box h2 {
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Student Login</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Login</button>
</div>

</body>
</html>
